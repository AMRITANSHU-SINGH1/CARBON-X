    <main class="p-6 max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">📜 Transaction History</h1>

        <!-- Summary Cards -->
         
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-slate-800 p-4 rounded-lg">
                <p class="text-slate-400 text-sm">Total Credits Bought</p>
                <p id="totalBought" class="text-2xl font-bold text-emerald-400">0</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-lg">
                <p class="text-slate-400 text-sm">Total Credits Sold</p>
                <p id="totalSold" class="text-2xl font-bold text-orange-400">0</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-lg">
                <p class="text-slate-400 text-sm">Net Credits</p>
                <p id="netCredits" class="text-2xl font-bold">0</p>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="bg-slate-800 rounded-lg p-6">
            <h2 class="text-xl font-semibold mb-3">All Transactions</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="border-b border-slate-700">
                        <tr>
                            <th>Tx ID</th>
                            <th>Type</th>
                            <th>From</th>
                            <th>To</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsTable">
                        <tr>
                            <td colspan="7" class="text-center text-slate-400 py-8">No transactions yet. Buy or sell credits in the Marketplace.{% endif %}
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Mock transaction data (empty initially)
        let transactions = [];

        function renderTransactions() {
            const tbody = document.getElementById('transactionsTable');
            if (transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-slate-400 py-8">No transactions yet. Buy or sell credits in the Marketplace.</td></tr>';
                document.getElementById('totalBought').innerText = '0';
                document.getElementById('totalSold').innerText = '0';
                document.getElementById('netCredits').innerText = '0';
                return;
            }

            let bought = 0, sold = 0;
            tbody.innerHTML = transactions.map(tx => {
                if (tx.type === 'buy') bought += tx.amount;
                if (tx.type === 'sell') sold += tx.amount;
                return `
                    <tr class="border-t border-slate-700/50">
                        <td class="py-2 font-mono text-xs">${tx.txId}</td>
                        <td><span class="px-2 py-0.5 rounded-full text-xs ${tx.type === 'buy' ? 'bg-green-900/50 text-green-300' : tx.type === 'sell' ? 'bg-blue-900/50 text-blue-300' : 'bg-purple-900/50 text-purple-300'}">${tx.type}</span></td>
                        <td>${tx.from}</td>
                        <td>${tx.to}</td>
                        <td>${tx.amount}</td>
                        <td>${tx.date}</td>
                        <td><span class="text-emerald-400">${tx.status}</span></td>
                    </tr>
                `;
            }).join('');

            document.getElementById('totalBought').innerText = bought;
            document.getElementById('totalSold').innerText = sold;
            document.getElementById('netCredits').innerText = bought - sold;
        }

        // Example: Add a mock transaction (for testing only - remove in production)
