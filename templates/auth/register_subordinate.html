{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <h2>Register Subordinate</h2>
    <p class="text-center mb-4 text-secondary">Create a new ecosystem manager account.</p>
    
    <form method="POST" action="{{ url_for('auth.register_subordinate') }}">
        <div class="form-group">
            <label for="username">Subordinate Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Provide initial Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn mt-4">Register Subordinate</button>
    </form>
    
    <div class="text-center mt-4">
        <a href="{{ url_for('dashboard.index') }}" style="color: var(--text-secondary);">Back to Admin Dashboard</a>
    </div>
</div>
{% endblock %}
