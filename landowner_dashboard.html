<body class="bg-slate-900 text-slate-100">

  <!-- Simple Navbar with link back to index.html -->
  <nav class="bg-slate-800 px-6 py-4 flex justify-between items-center">

  </nav>

  <main class="p-6 max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">📊 Landowners Dashboard</h1>

    <!-- Company Info & Credits -->
    <div class="bg-slate-800 rounded-lg p-6 mb-6">
      <p class="text-slate-400 text-sm">Your Carbon Credit Balance</p>
      <p id="creditBalance" class="text-4xl font-bold text-emerald-400">0</p>
      <p class="text-slate-500 text-xs mt-1">Credits earned by reducing emissions</p>
    </div>

    <!-- Emissions Summary -->
    <div class="bg-slate-800 rounded-lg p-6 mb-6">
      <h2 class="text-xl font-semibold mb-3">📈Land Summary</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <p class="text-slate-400 text-sm">Total land</p>
          <p id="totalEmissions" class="text-2xl font-bold">0</p>
          <!-- <p class="text-slate-500 text-xs">tons</p> -->
        </div>
        <div>
          <p class="text-slate-400 text-sm">total trees</p>
          <p id="reportCount" class="text-2xl font-bold">0</p>
          <p class="text-slate-500 text-xs">records submitted</p>
        </div>
      </div>
    </div>

    <!-- Recent Activity (Landowner Dashboard) -->
<div class="bg-slate-800 rounded-lg p-6">
  <h2 class="text-xl font-semibold mb-3">🌱 Recent Activity</h2>
  <div id="recentActivity" class="text-slate-400 text-center py-4">
    No activity yet. Go to Marketplace to list your carbon credits.
  </div>
</div>

<script>
  // Landowner dashboard: initial empty state (no backend yet)
  function loadLandownerDashboard() {
    // Display zeros / placeholders for landowner metrics
    document.getElementById('creditBalance').innerText = '0';       // carbon credits owned
    document.getElementById('totalSequestered').innerText = '0';    // tons CO₂ sequestered
    document.getElementById('projectCount').innerText = '0';        // active carbon projects/listings
    
    // Keep recent activity message for landowners
    document.getElementById('recentActivity').innerHTML = 
      'No activity yet. Go to Marketplace to list your carbon credits.';
  }
  
  loadLandownerDashboard();
