<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emissions | Carbon-X</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">

  <!-- Navbar with link back to index.html -->
  <nav class="bg-slate-800 px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="text-emerald-400 text-2xl font-bold">← CARBON-X</a>
    <div class="space-x-4">
      <a href="company_dashboard.html" class="hover:text-emerald-400">Dashboard</a>
      <a href="company_emissions.html" class="text-emerald-400">Emissions</a>
      <a href="comapny_marketplace.html" class="hover:text-emerald-400">Marketplace</a>
      <a href="company_profile.html" class="hover:text-emerald-400">Profile</a>
    </div>
  </nav>

  <main class="p-6 max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">🏭 Record Emissions</h1>

    <!-- Form to add new emission record -->
    <div class="bg-slate-800 rounded-lg p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">Add New Emission Record</h2>
      <form id="emissionForm" class="space-y-4">
        <div>
          <label class="block text-sm mb-1">CO₂ Emitted (tons)</label>
          <input type="number" id="co2Amount" step="0.1" required class="w-full p-2 rounded bg-slate-700 border border-slate-600">
        </div>
        <div>
          <label class="block text-sm mb-1">Reporting Period (e.g., Q1 2025)</label>
          <input type="text" id="period" placeholder="Q1 2025" required class="w-full p-2 rounded bg-slate-700 border border-slate-600">
        </div>
        <div>
          <label class="block text-sm mb-1">Emission Target (tons)</label>
          <input type="number" id="target" step="0.1" required class="w-full p-2 rounded bg-slate-700 border border-slate-600">
        </div>
        <button type="submit" class="bg-emerald-600 px-4 py-2 rounded hover:bg-emerald-500">Submit Emission</button>
      </form>
      <div id="formMessage" class="mt-3 text-sm hidden"></div>
    </div>

    <!-- List of past emissions -->
    <div class="bg-slate-800 rounded-lg p-6">
      <h2 class="text-xl font-semibold mb-3">📋 Past Emissions</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="border-b border-slate-700">
            <tr><th>Period</th><th>CO₂ (tons)</th><th>Target (tons)</th><th>Credits Earned</th><th>Date</th></tr>
          </thead>
          <tbody id="emissionsTable">
            <tr><td colspan="5" class="text-center text-slate-400 py-4">No emissions recorded yet. Add your first record above.{% endif %}</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    // Mock data array (will be replaced by backend later)
    let emissions = [];

    // Display emissions table
    function renderEmissions() {
      const tbody = document.getElementById('emissionsTable');
      if (emissions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-slate-400 py-4">No emissions recorded yet. Add your first record above.</td></tr>';
        return;
      }
      tbody.innerHTML = emissions.map(e => `
        <tr class="border-t border-slate-700/50">
          <td class="py-2">${e.period}</td>
          <td>${e.co2}</td>
          <td>${e.target}</td>
          <td class="text-emerald-400">${e.credits}</td>
          <td>${e.date}</td>
        </tr>
      `).join('');
    }

    // Handle form submit (simulate saving)
    document.getElementById('emissionForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const co2 = parseFloat(document.getElementById('co2Amount').value);
      const period = document.getElementById('period').value;
      const target = parseFloat(document.getElementById('target').value);
      
      // Calculate credits earned (if emission <= target)
      let credits = 0;
      if (co2 <= target) {
        const saved = target - co2;
        credits = Math.floor(saved * 10); // 10 credits per ton saved
      }
      
      const newEmission = {
        period: period,
        co2: co2,
        target: target,
        credits: credits,
        date: new Date().toLocaleDateString()
      };
      
      emissions.unshift(newEmission); // add to top
      renderEmissions();
      
      // Show success message
      const msgDiv = document.getElementById('formMessage');
      if (credits > 0) {
        msgDiv.innerHTML = `✅ Recorded! You earned ${credits} carbon credits.`;
        msgDiv.className = 'mt-3 text-sm text-emerald-400';
      } else {
        msgDiv.innerHTML = `✅ Emission recorded. (No credits earned because emission exceeded target)`;
        msgDiv.className = 'mt-3 text-sm text-yellow-400';
      }
      msgDiv.classList.remove('hidden');
      
      // Clear form
      document.getElementById('co2Amount').value = '';
      document.getElementById('period').value = '';
      document.getElementById('target').value = '';
      
      // Hide message after 3 seconds
      setTimeout(() => msgDiv.classList.add('hidden'), 3000);
    });
    
    // Initial render (empty state)
    renderEmissions();
    
    // Later, replace with real fetch to backend:
    // async function loadEmissions() { ... }
    // async function saveEmission(data) { ... }
  </script>
</body>
</html>
