<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Carbon-X</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">

  <!-- Simple Navbar with link back to index.html -->
  <nav class="bg-slate-800 px-6 py-4 flex justify-between items-center">
    <a href="index.html" class="text-emerald-400 text-2xl font-bold">← CARBON-X</a>
    <div class="space-x-4">
      <a href="transactions.html" class="hover:text-emerald-400">Transactions</a> 
      <a href="admin_marketplace.html" class="hover:text-emerald-400">Marketplace</a>
      <a href="admin_emission.html" class="hover:text-emerald-400">Emission </a>
      <a href="admin.html" class="text-emerald-400">Admin</a>
      
    </div>
  </nav>

  <main class="p-6 max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">Admin Panel</h1>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-slate-800 p-4 rounded-lg">
        <p class="text-slate-400 text-sm">Companies</p>
        <p id="totalCompanies" class="text-2xl font-bold">0</p>
      </div>
      <div class="bg-slate-800 p-4 rounded-lg">
        <p class="text-slate-400 text-sm">Total Emissions (tons)</p>
        <p id="totalEmissions" class="text-2xl font-bold">0</p>
      </div>
      <div class="bg-slate-800 p-4 rounded-lg">
        <p class="text-slate-400 text-sm">Credits Minted</p>
        <p id="totalCredits" class="text-2xl font-bold">0</p>
      </div>
      <div class="bg-slate-800 p-4 rounded-lg">
        <p class="text-slate-400 text-sm">Active Listings</p>
        <p id="activeListings" class="text-2xl font-bold">0</p>
      </div>
    </div>

    <!-- Companies Table -->
    <div class="bg-slate-800 rounded-lg p-4 mb-8">
      <h2 class="text-xl font-semibold mb-3">Registered Companies</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="border-b border-slate-700">
            <tr><th>Company</th><th>Industry</th><th>Credits</th></tr>
          </thead>
          <tbody id="companyTable">
            <tr><td colspan="3" class="text-center text-slate-400 py-4">No companies yet</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Transactions Table -->
    <div class="bg-slate-800 rounded-lg p-4">
      <h2 class="text-xl font-semibold mb-3">Recent Transactions</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="border-b border-slate-700">
            <tr><th>Tx ID</th><th>Type</th><th>Amount</th><th>Date</th></tr>
          </thead>
          <tbody id="txTable">
            <tr><td colspan="4" class="text-center text-slate-400 py-4">No transactions yet</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    // Mock data - replace with actual fetch to your backend later
    function loadAdminData() {
      // For now, show empty state (as per your requirement)
      document.getElementById('totalCompanies').innerText = '0';
      document.getElementById('totalEmissions').innerText = '0';
      document.getElementById('totalCredits').innerText = '0';
      document.getElementById('activeListings').innerText = '0';
      
      // Keep table empty messages
      document.getElementById('companyTable').innerHTML = '<tr><td colspan="3" class="text-center text-slate-400 py-4">No companies yet</td></tr>';
      document.getElementById('txTable').innerHTML = '<tr><td colspan="4" class="text-center text-slate-400 py-4">No transactions yet</td></tr>';
    }
    
    loadAdminData();
    
    // When you add backend, replace with:
    /*
    async function loadAdminData() {
      const res = await fetch('http://localhost:5000/api/admin/stats');
      const data = await res.json();
      document.getElementById('totalCompanies').innerText = data.total_companies;
      // ... etc
    }
    */
  </script>
</body>
</html>
