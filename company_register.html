<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Carbon-X</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">

    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-slate-800 p-8 rounded-xl w-full max-w-md">
            <a href="index.html" class="text-emerald-400 hover:underline">← Back to Home</a>
            <h1 class="text-2xl font-bold mt-4 mb-6">Create Industry|Company Account</h1>

            <form id="registerForm">
                <div class="mb-4">
                    <label class="block text-sm mb-1">Company Name</label>
                    <input type="text" id="companyName" required class="w-full p-2 rounded bg-slate-700 border border-slate-600">
                </div>
                <div class="mb-4">
                    <label class="block text-sm mb-1">Email</label>
                    <input type="email" id="email" required class="w-full p-2 rounded bg-slate-700 border border-slate-600">
                </div>
                <div class="mb-4">
                    <label class="block text-sm mb-1">Industry (optional)</label>
                    <input type="text" id="industry" placeholder="e.g., Manufacturing, Energy, Tech" class="w-full p-2 rounded bg-slate-700 border border-slate-600">
                </div>
                <div class="mb-4">
                    <label class="block text-sm mb-1">Password</label>
                    <input type="password" id="password" required minlength="6" class="w-full p-2 rounded bg-slate-700 border border-slate-600">
                </div>
                <div class="mb-4">
                    <label class="block text-sm mb-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" required class="w-full p-2 rounded bg-slate-700 border border-slate-600">
                </div>
                <button type="submit" class="w-full bg-emerald-600 py-2 rounded hover:bg-emerald-500">Register</button>
                <p id="errorMsg" class="text-red-400 text-sm mt-3 hidden"></p>
                <p id="successMsg" class="text-emerald-400 text-sm mt-3 hidden"></p>
            </form>

            <p class="mt-4 text-center text-slate-400">
                Already have an account? <a href="company_login.html" class="text-emerald-400">Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const companyName = document.getElementById('companyName').value;
            const email = document.getElementById('email').value;
            const industry = document.getElementById('industry').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validation
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            // Mock registration (replace with real fetch later)
            // Simulate success
            showSuccess('Registration successful! Redirecting to login...');
            
            // Clear form
            document.getElementById('registerForm').reset();
            
            // Redirect to login after 2 seconds
            setTimeout(() => {
                window.location.href = 'company_login.html';
            }, 2000);
            
            /* Real fetch example:
            const res = await fetch('http://localhost:5000/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    company_name: companyName,
                    email: email,
                    industry: industry,
                    password: password,
                    role: 'company'
                })
            });
            if (res.ok) {
                showSuccess('Registration successful! Redirecting to login...');
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                const data = await res.json();
                showError(data.error || 'Registration failed');
            }
            */
        });
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg;
            errorDiv.classList.remove('hidden');
            document.getElementById('successMsg').classList.add('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 3000);
        }
        
        function showSuccess(msg) {
            const successDiv = document.getElementById('successMsg');
            successDiv.innerText = msg;
            successDiv.classList.remove('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
        }
    </script>
</body>
</html>
