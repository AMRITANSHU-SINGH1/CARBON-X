{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <h2>Company Onboarding</h2>
    <p class="text-center mb-4 text-secondary">Register to track and offset carbon emissions.</p>
    
    <form method="POST" action="{{ url_for('auth.register_company') }}">
        <div class="form-group">
            <label for="company_name">Company Name</label>
            <input type="text" id="company_name" name="company_name" required>
        </div>
        <div class="form-group">
            <label for="registration_number">Company Registration / EIN</label>
            <input type="text" id="registration_number" name="registration_number" required>
        </div>
        <div class="form-group">
            <label for="username">Admin Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="email">Admin Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn mt-4">Create Account & Proceed</button>
    </form>
</div>
{% endblock %}
