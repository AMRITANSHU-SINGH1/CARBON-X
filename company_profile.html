<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Carbon-X</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">

    <!-- Navbar -->
    <nav class="bg-slate-800 px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="text-emerald-400 text-2xl font-bold">← CARBON-X</a>
        <div class="space-x-4">
            <a href="company_dashboard.html" class="hover:text-emerald-400">Dashboard</a>
            <a href="company_emissions.html" class="hover:text-emerald-400">Emissions</a>
            <a href="company_marketplace.html" class="hover:text-emerald-400">Marketplace</a>
            <a href="company_profile.html" class="text-emerald-400">Profile</a>
        </div>
    </nav>

    <main class="p-6 max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">👤 My Profile</h1>

        <div class="bg-slate-800 rounded-lg p-6 mb-6">
            <div class="text-center mb-6">
                <div class="text-6xl mb-2">🏢</div>
                <p id="companyName" class="text-2xl font-semibold">Your Company</p>
                <p id="creditBalance" class="text-emerald-400 text-xl mt-1">0 credits</p>
            </div>

            <form id="profileForm" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Company Name</label>
                    <input type="text" id="company_name" class="w-full p-2 rounded bg-slate-700 border border-slate-600">
                </div>
                <div>
                    <label class="block text-sm mb-1">Email</label>
                    <input type="email" id="email" class="w-full p-2 rounded bg-slate-700 border border-slate-600">
                </div>
                <div>
                    <label class="block text-sm mb-1">Industry</label>
                    <input type="text" id="industry" placeholder="e.g., Manufacturing, Energy, Tech" class="w-full p-2 rounded bg-slate-700 border border-slate-600">
                </div>
                <div>
                    <label class="block text-sm mb-1">Password (leave blank to keep same)</label>
                    <input type="password" id="password" class="w-full p-2 rounded bg-slate-700 border border-slate-600">
                </div>
                <button type="submit" class="bg-emerald-600 px-4 py-2 rounded hover:bg-emerald-500">Update Profile</button>
                <p id="updateMessage" class="text-sm hidden"></p>
            </form>
        </div>
    </main>

    <script>
        // Mock profile data (empty state)
        let profile = {
            company_name: '',
            email: '',
            industry: '',
            credits: 0
        };

        function loadProfile() {
            // In real app, fetch from backend
            document.getElementById('company_name').value = profile.company_name || '';
            document.getElementById('email').value = profile.email || '';
            document.getElementById('industry').value = profile.industry || '';
            document.getElementById('companyName').innerText = profile.company_name || 'Your Company';
            document.getElementById('creditBalance').innerText = profile.credits + ' credits';
        }

        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            profile.company_name = document.getElementById('company_name').value;
            profile.email = document.getElementById('email').value;
            profile.industry = document.getElementById('industry').value;
            
            const msg = document.getElementById('updateMessage');
            msg.innerHTML = '✅ Profile updated successfully!';
            msg.className = 'text-emerald-400 text-sm mt-2';
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 3000);
            
            // Update display name
            document.getElementById('companyName').innerText = profile.company_name || 'Your Company';
            
            // In real app: send PUT request to backend
        });

        loadProfile();
    </script>
</body>
</html>
